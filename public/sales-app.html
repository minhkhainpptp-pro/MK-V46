<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MK-V46 App bán hàng</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; color: #222; }
    header { padding: 14px 18px; background: #111827; color: #fff; }
    nav { display: flex; gap: 8px; padding: 12px; background: #fff; border-bottom: 1px solid #ddd; }
    button { padding: 9px 12px; border: 1px solid #ccc; background: #fff; border-radius: 8px; cursor: pointer; }
    button.active { background: #111827; color: #fff; }
    main { padding: 14px; }
    section { display: none; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; }
    section.active { display: block; }
    input, textarea { width: 100%; padding: 9px; margin: 5px 0 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .row { padding: 9px; border-bottom: 1px solid #eee; }
    pre { white-space: pre-wrap; background: #f3f4f6; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <header><b>MK-V46 App bán hàng</b> - 3 tab chuẩn: Khách hàng → Đặt hàng → Báo cáo</header>
  <nav>
    <button class="active" data-tab="customers">1. Khách hàng</button>
    <button data-tab="order">2. Đặt hàng</button>
    <button data-tab="report">3. Báo cáo</button>
  </nav>
  <main>
    <section id="customers" class="active">
      <h3>Khách hàng</h3>
      <input id="customerKeyword" placeholder="Tìm mã/tên khách hàng" />
      <button onclick="searchCustomers()">Tìm khách</button>
      <div id="customerRows"></div>
    </section>
    <section id="order">
      <h3>Đặt hàng</h3>
      <div class="grid">
        <div><label>Mã khách</label><input id="orderCustomerCode" /></div>
        <div><label>Ngày giao</label><input id="orderDeliveryDate" type="date" /></div>
        <div><label>Mã NVBH</label><input id="orderSalesStaffCode" /></div>
        <div><label>Mã NVGH</label><input id="orderDeliveryStaffCode" /></div>
      </div>
      <label>Items JSON</label>
      <textarea id="orderItems" rows="8">[{"productCode":"SP001","quantity":1,"price":100000}]</textarea>
      <button onclick="createOrder()">Tạo đơn pending</button>
      <pre id="orderResult"></pre>
    </section>
    <section id="report">
      <h3>Báo cáo đơn đã tạo</h3>
      <button onclick="loadOrders()">Tải danh sách</button>
      <div id="orderRows"></div>
    </section>
  </main>
  <script src="/js/search/unifiedSearchEngine.js"></script>
  <script>
    document.querySelectorAll('nav button').forEach(btn => btn.onclick = () => {
      document.querySelectorAll('nav button, section').forEach(x => x.classList.remove('active'));
      btn.classList.add('active'); document.getElementById(btn.dataset.tab).classList.add('active');
    });
    async function searchCustomers() {
      const q = document.getElementById('customerKeyword').value;
      const rows = await UnifiedSearchEngine.searchCustomer(q);
      document.getElementById('customerRows').innerHTML = rows.map(c => `<div class="row"><b>${c.customerCode || c.code || ''}</b> - ${c.customerName || c.name || ''}<br>${c.address || ''}</div>`).join('');
    }
    async function createOrder() {
      const payload = {
        customerCode: document.getElementById('orderCustomerCode').value,
        deliveryDate: document.getElementById('orderDeliveryDate').value,
        salesStaffCode: document.getElementById('orderSalesStaffCode').value,
        deliveryStaffCode: document.getElementById('orderDeliveryStaffCode').value,
        source: 'MOBILE',
        items: JSON.parse(document.getElementById('orderItems').value || '[]')
      };
      const res = await fetch('/api/sales-orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      document.getElementById('orderResult').textContent = JSON.stringify(await res.json(), null, 2);
    }
    async function loadOrders() {
      const res = await fetch('/api/sales-orders?limit=50');
      const data = await res.json();
      document.getElementById('orderRows').innerHTML = (data.rows || []).map(o => `<div class="row"><b>${o.code}</b> - ${o.customerName} - ${o.status} - ${o.payableAmount || o.finalAmount || o.totalAmount}</div>`).join('');
    }
  </script>
</body>
</html>
